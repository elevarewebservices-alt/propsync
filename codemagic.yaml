workflows:
  ios-capacitor-release:
    name: PropSync iOS (Capacitor → TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: propsync_app_store_connect
    environment:
      groups:
        # Contains CERTIFICATE_PRIVATE_KEY (secure) — the persistent private key
        # the distribution certificate is tied to, so every ephemeral build
        # machine signs with the SAME cert instead of creating an orphan each run.
        - propsync_signing
      vars:
        BUNDLE_ID: "com.propsyncia.app"
        XCODE_WORKSPACE: "mobile/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      xcode: latest
      cocoapods: default
      node: latest
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "ios-*"
    scripts:
      - name: Install npm dependencies
        script: |
          cd mobile
          npm install

      - name: Regenerate native iOS project
        # ios/ is gitignored (Capacitor regenerates it from capacitor.config.ts +
        # installed plugins) — `cap add` only works against a clean checkout.
        script: |
          cd mobile
          npx cap add ios
          npx cap sync ios

      - name: Generate app icon + splash screen
        # assets/icon.png (1024x1024) + assets/splash.png (2732x2732) →
        # populates ios/App/App/Assets.xcassets, regenerated fresh every
        # build since ios/ is gitignored.
        script: |
          cd mobile
          npx capacitor-assets generate --ios

      - name: Patch iOS native config (permissions, privacy manifest, encryption)
        # ios/ is regenerated every build, so the camera/photo usage strings,
        # the export-compliance flag and Apple's privacy manifest must be
        # (re)applied here — otherwise App Store review rejects the build.
        script: |
          cd mobile
          bash ios-config/patch-ios.sh

      - name: Install CocoaPods dependencies
        script: |
          cd mobile/ios/App
          pod install

      - name: Set up code signing
        # Account is new: no distribution certificate or provisioning profile
        # exist yet. fetch-signing-files --create generates both via the App
        # Store Connect API key (the integration above sets the auth env vars),
        # installs the cert into the keychain, then use-profiles wires the
        # profile into the Xcode project.
        script: |
          keychain initialize
          # --certificate-key ties signing to a persistent private key (stored as
          # a secure env var), so the distribution certificate is reused across
          # builds instead of being recreated (and orphaned) every run.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          # Point use-profiles at the App project explicitly — pod install also
          # generates Pods.xcodeproj, and the default glob can fail to wire the
          # profile into the right target, leaving archive without a profile.
          xcode-project use-profiles \
            --project "mobile/ios/App/App.xcodeproj"
          # Show which profile/identity got wired in, to confirm the match.
          xcodebuild -workspace "$XCODE_WORKSPACE" -scheme "$XCODE_SCHEME" \
            -showBuildSettings 2>/dev/null \
            | grep -Ei "PRODUCT_BUNDLE_IDENTIFIER|PROVISIONING_PROFILE|CODE_SIGN_IDENTITY|DEVELOPMENT_TEAM" \
            | sort -u || true

      - name: Increment build number
        script: |
          cd mobile/ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Upload the build to App Store Connect only. We intentionally do NOT
        # submit_to_testflight: that submits to EXTERNAL beta review, which
        # requires Beta App Information (feedback email + reviewer contact) and
        # fails the build until it's filled. The uploaded build is still
        # available for internal TestFlight testing and for App Store review.
        submit_to_testflight: false
      email:
        recipients:
          - claudiojupiter55@gmail.com
        notify:
          success: true
          failure: true
