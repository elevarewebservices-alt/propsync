services:
  postgres:
    image: postgres:16-alpine
    container_name: fb_publisher_postgres
    environment:
      POSTGRES_DB: fb_publisher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - fb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fb_publisher_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - fb_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fb_postgres_data:
  fb_redis_data:
