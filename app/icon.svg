<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="33%" stop-color="#fb923c"/>
      <stop offset="66%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- rounded square frame -->
  <rect x="132" y="132" width="760" height="760" rx="170" ry="170"
        fill="none" stroke="url(#g)" stroke-width="54" stroke-linejoin="round"/>

  <!-- house pictogram: one continuous stroke, roof + both walls -->
  <path d="M 400,584 L 400,460 L 512,360 L 624,460 L 624,584"
        fill="none" stroke="url(#g)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arrow exiting right from base of right wall -->
  <path d="M 624,584 C 670,618 705,620 758,620"
        fill="none" stroke="url(#g)" stroke-width="40" stroke-linecap="round"/>
  <polygon points="752,583 836,620 752,657" fill="url(#g)"/>

  <!-- arrow exiting left from base of left wall -->
  <path d="M 400,584 C 354,618 319,620 266,620"
        fill="none" stroke="url(#g)" stroke-width="40" stroke-linecap="round"/>
  <polygon points="272,583 188,620 272,657" fill="url(#g)"/>
</svg>
